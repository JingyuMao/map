<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 Day Jewels of Europe – River Cruise</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { width: 100%; height: 100%; font-family: 'Lato', sans-serif; background: #CDCFCC; }

    #map { width: 100vw; height: 100vh; }

    /* ═══════════════════════════════════════════════════════════════
       MAP COLOUR  —  to change the colour tone at runtime call:
         map.setPaintProperty('base-tiles', 'raster-hue-rotate', 0);
         map.setPaintProperty('base-tiles', 'raster-saturation', 0);
         map.setPaintProperty('base-tiles', 'raster-brightness-max', 1);
         map.setPaintProperty('background', 'background-color', '#e8e0d0');
       Or swap the whole style with map.setStyle({...})
    ═══════════════════════════════════════════════════════════════ */

    /* ── Fixed card overlay (stays on screen when map pans) ─────── */
    #map-card {
      display: none;
      position: absolute;
      width: 320px;
      z-index: 200;
      border-radius: 24px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 24px 64px rgba(0,0,0,0.20), 0 8px 20px rgba(0,0,0,0.10);
      opacity: 0;
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: all;
    }
    #map-card.card-visible {
      opacity: 1;
      transform: translateY(0) !important;
    }
    #map-card-close {
      position: absolute; top: 10px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.42); color: #fff; border: none;
      border-radius: 50%; width: 26px; height: 26px;
      font-size: 16px; line-height: 26px; text-align: center;
      cursor: pointer; padding: 0;
    }
    #map-card-close:hover { background: rgba(0,0,0,0.65); }

    /* ── Legend ──────────────────────────────────────────────────── */
    .legend {
      position: absolute;
      bottom: 28px; left: 24px;
      z-index: 1000;
      background: rgba(255,252,245,0.97);
      padding: 13px 16px 14px;
      border-radius: 8px;
      font-size: 11px; color: #333;
      box-shadow: 0 4px 24px rgba(0,0,0,0.11), 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid rgba(210,195,160,0.40);
    }
    .legend-title { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #2980c4; margin-bottom: 11px; }
    .legend-item  { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .legend-item:last-of-type { margin-bottom: 0; }
    .legend-line  { width: 30px; height: 4px; background: #2980c4; border-radius: 2px; box-shadow: 0 0 0 2px rgba(255,255,255,0.95), 0 0 0 3px rgba(41,128,196,0.18); flex-shrink: 0; }
    .legend-dash  { width: 30px; height: 0; border-top: 4px dashed #9B0032; flex-shrink: 0; }
    .legend-dot   { width: 11px; height: 11px; border-radius: 50%; background: white; border: 2.5px solid #2980c4; flex-shrink: 0; }
    .legend-dot-filled { width: 14px; height: 14px; border-radius: 50%; background: #2980c4; border: 2.5px solid #1a6099; flex-shrink: 0; }
    .legend-note  { margin-top: 10px; padding-top: 9px; border-top: 1px solid rgba(0,0,0,0.08); font-size: 10px; color: #999; font-style: italic; }

    /* ── Popup card ──────────────────────────────────────────────── */
    /* ── Popup image area ───────────────────────────────────────── */
    .popup-img-wrap { position: relative; }
    .popup-img { width: 320px; height: 180px; overflow: hidden; position: relative; }
    .popup-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Activity kind badge overlaid top-left on photo */
    .popup-kind-overlay {
      position: absolute; top: 12px; left: 14px; z-index: 3;
      background: rgba(174,143,91,0.88); backdrop-filter: blur(6px);
      color: #fff; font-size: 9px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      padding: 5px 12px; border-radius: 20px;
    }

    /* Icon sticker floating on the photo/body boundary */
    .popup-icon-sticker {
      position: absolute; bottom: -26px; right: 20px; z-index: 4;
      width: 52px; height: 52px; border-radius: 14px;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: center;
    }
    .popup-icon-sticker img { width: 38px; height: 38px; object-fit: contain; }

    /* ── Popup body ─────────────────────────────────────────────── */
    .popup-body { width: 320px; background: #FAFAFA; padding: 36px 20px 24px; }

    /* City · River inline title row */
    .popup-title-row { display: flex; align-items: baseline; gap: 0; margin-bottom: 10px; flex-wrap: nowrap; overflow: hidden; }
    .popup-city      { font-family: 'Lato', sans-serif; font-size: 18px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.2px; white-space: nowrap; }
    .popup-title-sep { font-size: 14px; color: #d0c8c0; margin: 0 8px; font-weight: 300; flex-shrink: 0; }
    .popup-river-inline { font-size: 12px; color: #b0a89e; font-weight: 400; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .popup-act-text { font-size: 13px; line-height: 1.7; color: #5d6470; }
    .popup-none { font-size: 13px; color: #b0a89e; font-style: italic; line-height: 1.65; }

    /* ── City & country labels ───────────────────────────────────── */
    .city-label {
      font-family: 'Lato', sans-serif; color: #1a1a1a;
      white-space: nowrap; pointer-events: none; letter-spacing: 0.3px;
      text-shadow: -1.5px -1.5px 0 rgba(235,225,198,1), 1.5px -1.5px 0 rgba(235,225,198,1),
                   -1.5px  1.5px 0 rgba(235,225,198,1), 1.5px  1.5px 0 rgba(235,225,198,1),
                    0 0 6px rgba(235,225,198,1), 0 0 12px rgba(235,225,198,0.55);
    }
    .city-label-terminal {
      font-family: 'Playfair Display', Georgia, serif; color: #1a1a1a;
      white-space: nowrap; pointer-events: none; letter-spacing: 0.3px;
      text-shadow: -1.5px -1.5px 0 rgba(235,225,198,1), 1.5px -1.5px 0 rgba(235,225,198,1),
                   -1.5px  1.5px 0 rgba(235,225,198,1), 1.5px  1.5px 0 rgba(235,225,198,1),
                    0 0 6px rgba(235,225,198,1), 0 0 12px rgba(235,225,198,0.55);
    }
    .country-label {
      font-family: 'Playfair Display', Georgia, serif; font-style: italic;
      color: #aaa; white-space: nowrap; pointer-events: none; letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255,255,255,1), 0 0 20px rgba(255,255,255,0.85);
    }

    /* ── Custom map controls ─────────────────────────────────────── */
    .map-ctrl-group {
      position: absolute; bottom: 28px; right: 24px; z-index: 1000;
      display: flex; flex-direction: column;
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15), 0 1px 4px rgba(0,0,0,0.07);
      border: 1px solid rgba(210,195,160,0.40);
    }
    .map-ctrl-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: rgba(255,252,245,0.97); color: #2980c4;
      font-size: 20px; font-weight: 300; line-height: 1;
      cursor: pointer; border: none;
      transition: background 0.15s, color 0.15s; user-select: none;
    }
    .map-ctrl-btn:hover  { background: #2980c4; color: #fff; }
    .map-ctrl-btn:active { background: #1a6099; color: #fff; }
    .map-ctrl-btn.disabled { color: #c8c0b6; pointer-events: none; }
    .map-ctrl-divider { height: 1px; background: rgba(200,190,160,0.42); }

    /* ── Marker dot — pulse + hover ─────────────────────────────── */
    @keyframes dot-pulse {
      0%   { box-shadow: 0 0 0 0    rgba(41,128,196,0.72), 0 2px 5px rgba(0,0,0,0.22); }
      65%  { box-shadow: 0 0 0 14px rgba(41,128,196,0.00), 0 2px 5px rgba(0,0,0,0.22); }
      100% { box-shadow: 0 0 0 0    rgba(41,128,196,0.00), 0 2px 5px rgba(0,0,0,0.22); }
    }
    .marker-dot {
      animation: dot-pulse 2.2s ease-out infinite;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1);
    }
    .marker-dot:hover { transform: scale(1.55); }

    /* ── Black pin marker — ground-shadow pulse + hover bounce ───── */
    @keyframes pin-shadow-pulse {
      0%, 100% { transform: translateX(-50%) scale(1);   opacity: 0.30; }
      50%       { transform: translateX(-50%) scale(2.4); opacity: 0.58; }
    }
    .marker-pin {
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1);
      transform-origin: bottom center;
      position: relative;
      display: inline-block;
    }
    /* Ground shadow beneath the pin tip */
    .marker-pin::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 50%;
      transform: translateX(-50%);
      width: 9px; height: 5px;
      border-radius: 50%;
      background: rgba(0,0,0,0.32);
      animation: pin-shadow-pulse 2.2s ease-in-out infinite;
    }
    .marker-pin:hover { transform: scale(1.35) translateY(-3px); }

    /* Pin with no ground-shadow effect (used for Bratislava) */
    .marker-pin-static {
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1);
      transform-origin: bottom center;
      display: inline-block;
    }
    .marker-pin-static:hover { transform: scale(1.35) translateY(-3px); }

    /* ── Responsive: tablet ─────────────────────────────────────── */
    @media (max-width: 900px) { }

    /* ── Responsive: mobile ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .legend { bottom: 16px; left: 12px; padding: 9px 12px; font-size: 10px; }
      .legend-title { font-size: 8px; margin-bottom: 7px; }
      .legend-item  { gap: 7px; margin-bottom: 6px; }
      .legend-note  { display: none; }
      .map-ctrl-btn { width: 42px; height: 42px; font-size: 22px; }
      #map-card { width: auto !important; left: 12px !important; right: 12px !important; border-radius: 16px; }
      #map-card.card-visible { transform: translateY(0) !important; }
      .popup-img  { width: 100% !important; height: 44vw !important; max-height: 180px; }
      .popup-body { width: 100% !important; padding: 30px 16px 20px; }
      .popup-city { font-size: 16px; }
      .popup-icon-sticker { width: 44px; height: 44px; border-radius: 11px; bottom: -22px; }
      .popup-icon-sticker img { width: 32px; height: 32px; }
    }
  </style>
</head>

  <div id="map"></div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-title">Map Legend</div>
    <div class="legend-item"><div class="legend-line"></div><span>River cruise route</span></div>
    <div class="legend-item"><svg xmlns="http://www.w3.org/2000/svg" width="11" height="15" viewBox="0 0 20 26" style="flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.25))"><path d="M10 0C4.477 0 0 4.477 0 10c0 7.5 10 16 10 16S20 17.5 20 10C20 4.477 15.523 0 10 0z" fill="#1a1a1a"/><circle cx="10" cy="10" r="3.5" fill="white"/></svg><span>Shore excursion</span></div>

      </svg>
    </button>
  </div>

    // ── Catmull-Rom spline ────────────────────────────────────────
    // pts must be [lng, lat] pairs (MapLibre / GeoJSON convention)
    function spline(pts, segs = 10) {
      const out = [];
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(0, i - 1)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(pts.length - 1, i + 2)];
        for (let s = 0; s < segs; s++) {
          const t = s / segs, t2 = t * t, t3 = t2 * t;
          out.push([
            0.5 * ((2*p1[0]) + (-p0[0]+p2[0])*t + (2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2 + (-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
            0.5 * ((2*p1[1]) + (-p0[1]+p2[1])*t + (2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2 + (-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
          ]);
        }
      }
      out.push(pts[pts.length - 1]);
      return out;
    }

          <div class="popup-kind-overlay">${kindBadge}</div>

    };

    // ── Everything added after map loads ──────────────────────────
    map.on('load', () => {

      // ── Warm vintage colour overrides for the positron base style ──
      // These are the layer IDs from the OpenFreeMap positron style.
      // Change any of these values to restyle the map in real time:
      //   map.setPaintProperty('background',          'background-color', '#E6E3DE');
      //   map.setPaintProperty('water',               'fill-color',       '#8ab5bf');
      //   map.setPaintProperty('boundary_2',          'line-color',       'rgba(120,100,60,0.6)');
      map.setPaintProperty('background',          'background-color', '#E6E3DE');
      map.setPaintProperty('water',               'fill-color',       '#aac5cb');
      map.setPaintProperty('water-intermittent',  'fill-color',       '#aac5cb');
      map.setPaintProperty('waterway',            'line-color',       '#aac5cb');
      // Flatten all land-cover fills to the base land colour so no green patches show
      map.setPaintProperty('landuse_residential', 'fill-color', '#E6E3DE');
      map.setPaintProperty('landcover_wood',      'fill-color', '#E6E3DE');
      map.setPaintProperty('park',                'fill-color', '#E6E3DE');
      // Sweep any other land-cover / landuse fills the positron style may include
      ['landcover_grass','landuse_grass','landuse_park','landuse_commercial',
       'landuse_industrial','landuse_cemetery','landuse_farmland','landuse_scrub',
       'landuse_meadow','landcover_sand','landcover_ice'].forEach(id => {
        if (map.getLayer(id)) map.setPaintProperty(id, 'fill-color', '#E6E3DE');
      });
      map.setPaintProperty('boundary_2',          'line-color',       'rgba(140,120,80,0.55)');
      map.setPaintProperty('boundary_3',          'line-color',       'rgba(140,120,80,0.35)');

      // ── Hide built-in labels (we draw our own) ──────────────────
      map.getStyle().layers
        .filter(l => l.type === 'symbol')
        .forEach(l => map.setLayoutProperty(l.id, 'visibility', 'none'));

      // ── Hide all road / rail / aeroway lines — keep only water & borders ──
      // Positron draws roads, motorways, railways and runways as white or
      // near-white lines. Hide every tile line layer that isn't one we use.
      const keepLines = new Set(['waterway', 'boundary_2', 'boundary_3']);
      map.getStyle().layers
        .filter(l => l.type === 'line' && !keepLines.has(l.id))
        .forEach(l => map.setLayoutProperty(l.id, 'visibility', 'none'));

      // ── Netherlands tint — OSM boundary from Nominatim (same source as tile lines) ──
      map.addSource('nl-tint-source', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] }
      });
      fetch('https://nominatim.openstreetmap.org/search?country=nl&polygon_geojson=1&polygon_threshold=0.002&format=json&limit=1&featuretype=country')
        .then(r => r.json())
        .then(arr => {
          const g = arr && arr[0] && arr[0].geojson;
          if (g) map.getSource('nl-tint-source').setData({ type: 'Feature', geometry: g, properties: {} });
        }).catch(() => {});
      map.addLayer({
        id: 'nl-tint-fill',
        type: 'fill',
        source: 'nl-tint-source',
        paint: {
          'fill-color': '#EDC5C2',

        }

      });
      map.addLayer({

        type: 'fill',

        paint: { 'fill-color': '#D4D4C6', 'fill-opacity': 1.0 }
      }, 'boundary_2');
      // OSM boundary data via Nominatim — same source as the tile border lines

        .then(r => r.json())

      });
      // Main line
      map.addLayer({ id: 'route-main', type: 'line', source: 'route',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint:  { 'line-color': '#2980c4', 'line-width': 5.5, 'line-opacity': 1.0 }
      });

      // ── Dürnstein → Krems cycling excursion (dashed) ────────────
      const excursionPts = spline([
        [15.518, 48.394],  // Dürnstein [lng,lat]

        [15.617, 48.409]   // Krems

      map.addSource('excursion-bike', {

        paint:  { 'line-color': '#9B0032', 'line-width': 3.5, 'line-opacity': 0.85, 'line-dasharray': [1.5, 2] }

      // ── Country labels ──────────────────────────────────────────
      [

      const syncBike = () => {
        if (map.getZoom() >= 7) { if (!bikeOnMap) { bikeMarker.addTo(map); bikeOnMap = true; } }

      // ── Fixed card overlay ──────────────────────────────────────
      const mapCard        = document.getElementById('map-card');
      const mapCardContent = document.getElementById('map-card-content');
      let hoverCloseTimer  = null;

      function showCard(stop, lngLat) {
        mapCardContent.innerHTML = buildPopup(stop);

        // Position near the marker
        const pt    = map.project(lngLat);
        const mapEl = map.getContainer();
        const cw    = 320;
        const ch    = 290;   // estimated card height
        const gap   = 16;    // gap between marker and card edge

        // Prefer above the marker; fall back to below if not enough room
        let left = pt.x - cw / 2;
        let top  = pt.y - ch - gap - (stop.pinIcon ? 17 : 10);
        if (top < 8) top = pt.y + gap + (stop.pinIcon ? 6 : 10);

        // Clamp horizontally within the map container
        left = Math.max(8, Math.min(left, mapEl.offsetWidth - cw - 8));

        mapCard.style.left      = left + 'px';
        mapCard.style.top       = top  + 'px';
        mapCard.style.bottom    = 'auto';
        mapCard.style.transform = 'translateY(8px)';

        mapCard.style.display = 'block';
        requestAnimationFrame(() => mapCard.classList.add('card-visible'));
      }
      function hideCard() {
        mapCard.classList.remove('card-visible');
        setTimeout(() => {
          if (!mapCard.classList.contains('card-visible')) mapCard.style.display = 'none';
        }, 220);
      }
      document.getElementById('map-card-close').addEventListener('click', hideCard);
      mapCard.addEventListener('mouseenter', () => clearTimeout(hoverCloseTimer));
      mapCard.addEventListener('mouseleave', () => { hoverCloseTimer = setTimeout(hideCard, 180); });
      map.on('click', () => { if (isMobile) hideCard(); });

      // ── Markers, labels & popups ────────────────────────────────
      // Only these stops show a popup; all others get a plain static dot
      const popupStops = new Set(['Bonn', 'Wertheim', 'Dürnstein', 'Vienna', 'Budapest']);


      stops.forEach((stop, i) => {
        const stopLngLat  = ll(stop.coords);
        const delay       = -(i * 0.38).toFixed(2);
        const isInteractive = (stop.pinIcon && !stop.noPopup) || popupStops.has(stop.name);

        // ── Marker element ──────────────────────────────────────
        let markerEl;

        if (stop.terminalIcon) {
          // Cruise start / finish — same visual as Budapest but no animation
          markerEl = document.createElement('div');
          markerEl.style.cssText = 'width:18px;height:18px;border-radius:50%;background:#2980c4;border:3px solid #1a6099;pointer-events:none;';

        } else if (stop.pinIcon) {
          // Pin icon — always render as pin regardless of popup status
          markerEl = document.createElement('div');
          markerEl.className = stop.noEffect ? 'marker-pin-static' : 'marker-pin';
          if (!isInteractive) markerEl.style.cursor = 'default';
          markerEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="17" viewBox="0 0 20 26" style="display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.32))">

            <circle cx="10" cy="10" r="3.5" fill="white"/>
          </svg>`;

        } else if (!isInteractive) {
          // Plain static dot — no animation, no pointer events
          markerEl = document.createElement('div');
          markerEl.style.cssText = 'width:13px;height:13px;border-radius:50%;background:white;border:2px solid rgba(41,128,196,0.55);pointer-events:none;';

        } else if (stop.type === 'terminal') {
          markerEl = document.createElement('div');
          markerEl.className = 'marker-dot';
          markerEl.style.cssText = `width:18px;height:18px;border-radius:50%;background:#2980c4;border:3px solid #1a6099;cursor:pointer;animation-delay:${delay}s`;

        } else {
          markerEl = document.createElement('div');
          markerEl.className = 'marker-dot';
          markerEl.style.cssText = `width:13px;height:13px;border-radius:50%;background:white;border:2.5px solid #2980c4;cursor:pointer;animation-delay:${delay}s`;
        }

        const anchor = stop.pinIcon ? 'bottom' : 'center';
        const markerOffset = stop.markerOffset || [0, 0];
        new maplibregl.Marker({ element: markerEl, anchor, offset: markerOffset })
          .setLngLat(stopLngLat)
          .addTo(map);

        // ── Card (interactive stops only) ───────────────────────
        if (isInteractive) {
          if (!isMobile) {
            markerEl.addEventListener('mouseenter', () => {
              clearTimeout(hoverCloseTimer);
              showCard(stop, stopLngLat);
            });
            markerEl.addEventListener('mouseleave', () => {
              hoverCloseTimer = setTimeout(hideCard, 180);
            });
          } else {
            markerEl.addEventListener('click', e => {
              e.stopPropagation();
              if (mapCard.classList.contains('card-visible')) hideCard();
              else showCard(stop, stopLngLat);
            });
          }
        }

        // ── City label (all stops) ──────────────────────────────
        const isTerminal = stop.type === 'terminal';
        const cfg        = labelPos[stop.name] || { pos: 'above', dx: 0, dy: 0 };
        const pos        = cfg.pos;
        const dx         = cfg.dx || 0;
        const dy         = cfg.dy || 0;

        const labelEl = document.createElement('div');
        labelEl.className = isTerminal ? 'city-label-terminal' : 'city-label';
        const isHoriz = pos === 'right' || pos === 'left';
        labelEl.style.cssText = `
          font-size:${isTerminal ? 17 : 15}px;
          font-weight:${isTerminal ? 700 : 600};
          transform:${isHoriz ? 'translateY(-50%)' : `translateX(calc(-50% + ${dx}px))`};
          pointer-events:none;
          white-space:nowrap;
        `;
        labelEl.textContent = stop.name;

        const markerSize = stop.pinIcon ? 17 : (isTerminal ? 18 : 13);
        const gap = 6;
        let labelAnchor, labelOffset;
        if (pos === 'right') {
          labelAnchor = 'left';
          labelOffset = [markerSize / 2 + gap + dx, dy];
        } else if (pos === 'left') {
          labelAnchor = 'right';
          labelOffset = [-(markerSize / 2 + gap + dx), dy];
        } else {
          const yOffset = pos === 'above'
            ? -(markerSize / 2 + gap + dy)
            : (markerSize / 2 + gap + dy);
          labelAnchor = pos === 'above' ? 'bottom' : 'top';
          labelOffset = [dx, yOffset];
        }

        new maplibregl.Marker({
          element: labelEl,
          anchor: labelAnchor,
          offset: labelOffset
        })
          .setLngLat(stopLngLat)
          .addTo(map);
      });

      // ── Mobile: fit to full route ───────────────────────────────
      if (isMobile) {
        map.fitBounds([[2.8, 46.8], [21.2, 52.7]], { padding: 28, maxZoom: 5.62, animate: false });
        const note = document.querySelector('.legend-note');
        if (note) note.textContent = 'Tap any stop to see activities';
      }
    }); // end map.on('load')

    // ── Custom control wiring ─────────────────────────────────────
    document.getElementById('ctrl-zoom-in').addEventListener('click',  () => map.zoomIn());
    document.getElementById('ctrl-zoom-out').addEventListener('click', () => map.zoomOut());
    document.getElementById('ctrl-reset').addEventListener('click', () => {
      if (isMobile) {
        map.fitBounds([[2.8, 46.8], [21.2, 52.7]], { padding: 28, maxZoom: 5.62, animate: true, duration: 600 });
      } else {
        map.flyTo({ center: [11.5, 50.0], zoom: 5.62, duration: 600 });
      }
    });

    const syncCtrlBtns = () => {
      document.getElementById('ctrl-zoom-out').classList.toggle('disabled', map.getZoom() <= map.getMinZoom());
      document.getElementById('ctrl-zoom-in').classList.toggle('disabled',  map.getZoom() >= map.getMaxZoom());
    };
    map.on('zoom', syncCtrlBtns);
    syncCtrlBtns();
  </script>
</body>
</html>
